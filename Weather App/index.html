<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" 
    />
    <title>Weather</title>
</head>
<body>
    <div class="box">
        <div class="search-bar">
            <input type="text" placeholder="Enter your city name" id="bar" spellcheck="false">
            <button id="search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="climate">
            <img src="/Weather App/Assets/snow.png" class="Weather-icon" >
            <h1 class="temp">15°c</h1>
            <h2 class="city">Bengaluru</h2>
            <div class="details">
                <div class="col">
                    <img src="/Weather App/Assets/humidity.png">
                    <p class="humidity"> 53%</p>
                    <p>humidity</p>
                </div>
                <div class="col">
                    <img src="/Weather App/Assets/wind.png" >
                    <p class="wind"> 15km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
