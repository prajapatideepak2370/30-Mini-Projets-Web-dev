<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Pop Up</title>
</head>
<body>
    <div class="container">
        <button type="submit" class="btn" onclick="openPopup()"> Submit</button>
        <div class="popup" id="popup">
            <i id="tick" class="fa-solid fa-circle-check"></i>
            <h2>Thank You!!<i class="fa-solid fa-face-grin"></i></h2>
            <p>Your Details has been success<i class="fa-solid fa-thumbs-up"></i></p>
            <button type="button" onclick="closePopup()">OK<i class="fa-brands fa-angellist"></i></button>
        </div>
    </div>
<script >
    let popup = document.getElementById("popup");

    function openPopup() {
        popup.classList.add("open-popup");
    }
    function closePopup() {
        popup.classList.remove("open-popup");
    }

</script>
</body>
</html>
