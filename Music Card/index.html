<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Music Player Card</title>
</head>
<body>
    <div class="container">
        <div class="music-player">
            <nav>
                <div class="circle">
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
                <div class="circle">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </nav>
            <img src="/Music Card/assets/music-card.png" >
            <h1>Sitaree (From "Ikkis")</h1>
            <p>Song. Arijit Singh</p>

            <audio  id="song">
                <source src="/Music Card/assets/4.mp3" type="audio/mpeg">
            </audio>
            <input type="range" value="0" id="progess">
            <div class="control">
                <div><i class="fa-solid fa-backward-fast"></i></div>
                <div onclick="playPause()"><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
                <div><i class="fa-solid fa-forward-fast"></i></div>
            </div>
        </div>

        
    </div>


<script src="script.js"></script>   
</body>
</html>
