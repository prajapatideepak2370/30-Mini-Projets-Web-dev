<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Toast Notifcation</title>
</head>
<body>
    <div class="notify-btn">
        <button onclick="showToast(successMsg)">Success</button>
        <button onclick="showToast(errorMsg)">Error</button>
        <button onclick="showToast(invalidMsg)">Invalid</button>
    </div>
    <div id="toastBox"></div>
<script>
    let toastBox = document.getElementById('toastBox');
    let successMsg = 'Successfully submitted';
    let errorMsg = 'Please fix the error!';
    let invalidMsg = 'Invalid input, check again';
    
    function showToast(msg){
        let toast = document.createElement('div');
        toast.classList.add('toast');
        toast.innerHTML = msg;
        toastBox.appendChild(toast);

    }
</script>
</body>
</html>
